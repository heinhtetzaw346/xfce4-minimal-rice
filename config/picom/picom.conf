#################################
#         Backend Options       #
#################################

backend = "glx";
vsync = true;
use-damage = false;
glx-no-stencil = true;
glx-no-rebind-pixmap = true;

#################################
#        General Settings       #
#################################

corner-radius = 10;
round-borders = 10;
detect-rounded-corners = true;

#rounded-corners-exclude = [
#  "class_g = 'Xfce4-panel'"
#];

shadow = true;
shadow-radius = 3;
shadow-opacity = 0.3;
shadow-offset-x = 3;
shadow-offset-y = 3;

shadow-exclude = [
  "name = 'Notification'",
  "class_g = 'Conky'",
  "class_g ?= 'Notify-osd'",
  "class_g = 'Cairo-clock'",
  "class_g = 'Xfce4-notifyd'",
  "class_g = 'xfce4-power-manager'",
  "class_g = 'Xfce4-panel'",
  "class_g = 'Wrapper-2.0'",
  "class_g = 'firefox'",
  "class_g = 'baobab'",
  "class_g = 'Gnome-disks'",
  "class_g = 'gnome-system-monitor'",
  "class_g = 'Pinhole'",
  "class_g = 'gnome-calculator'",
  "class_g = 'Eog'",
  "class_g = 'Evince'",
  "class_g = 'librewolf'",
  "class_g = 'org.gnome.SoundRecorder'",
  "class_g = 'Protonvpn-app'",
  "_GTK_FRAME_EXTENTS@:c"
];

fading = true;
fade-in-step = 0.06;
fade-out-step = 0.08;
fade-delta = 10;

#################################
#         Transparency          #
#################################

opacity-rule = [
  "95:class_g = 'Wrapper-2.0'",
  "95:class_g = 'Thunar'",
  "93:class_g = 'Notion'",
  "95:class_g = 'discord'",
  "95:class_g = 'obsidian'",
  "95:class_g = 'Code'",
  "95:class_g = 'teams-for-linux'",
  "95:class_g = 'draw.io'",
  "90:class_g = 'Spotify'",
  "95:class_g = 'ViberPC'"
];

#################################
#           Blur                #
#################################

blur:
{
  method = "dual_kawase";
  size = 20;
  #strength = 20;
  #deviation = 15;
};

# Disable global blur
blur-background = true;
blur-background-frame = true;
blur-background-fixed = true;

blur-background-exclude = [
  "name = 'Notification'",
  "class_g = 'Conky'",
  "class_g ?= 'Notify-osd'",
  "class_g = 'Cairo-clock'",
  "class_g = 'Xfce4-notifyd'",
  "class_g = 'xfce4-power-manager'",
#  "class_g = 'Xfce4-panel'",
  "class_g = 'Wrapper-2.0'",
  "class_g = 'firefox'",
  "class_g = 'baobab'",
  "class_g = 'Gnome-disks'",
  "class_g = 'gnome-system-monitor'",
  "class_g = 'Pinhole'",
  "class_g = 'gnome-calculator'",
  "class_g = 'Eog'",
  "class_g = 'Evince'",
  "class_g = 'librewolf'",
  "class_g = 'org.gnome.SoundRecorder'",
  "class_g = 'Protonvpn-app'",
  "_GTK_FRAME_EXTENTS@:c"
];


#################################
#     Window Type Settings      #
#################################

wintypes:
{
#  menu = { shadow = false; blur-background = false; };
  dock = { shadow = false; blur-background = false; };
  desktop = { shadow = false; blur-background = false; };
  tooltip = { shadow = false; blur-background = false; };
  dropdown_menu = { shadow = false; blur-background = false; };
  popup_menu = { shadow = false; blur-background = false; };
  utility = { shadow = false; blur-background = false; };
  dialog = { shadow = false; blur-background = false; };
};

##################################
#	    Animations		 #
##################################
# fly-in: Windows fly in from random directions to the screen
# maximize: Windows pop from center of the screen to their respective positions
# minimize: Windows minimize from their position to the center of the screen
# slide-in-center: Windows move from upper-center of the screen to their respective positions
# slide-out-center: Windows move to the upper-center of the screen
# slide-left: Windows are created from the right-most window position and slide leftwards
# slide right: Windows are created from the left-most window position and slide rightwards
# slide-down: Windows are moved from the top of the screen and slide downward
# slide-up: Windows are moved from their position to top of the screen
# squeeze: Windows are either closed or created to/from their center y-position (the animation is similar to a blinking eye)
# squeeze-bottom: Similar to squeeze, but the animation starts from bottom-most y-position
# zoom: Windows are either created or destroyed from/to their center (not the screen center)

#################################

#enable or disable animations
animations = true;
#change animation speed of windows in current tag e.g open window in current tag
animation-stiffness-in-tag = 160;
#change animation speed of windows when tag changes
animation-stiffness-tag-change = 160;

animation-window-mass = 0.4;
animation-dampening = 15;
animation-clamping = true;


#open windows
animation-for-open-window = "fly-in";
#minimize or close windows
animation-for-unmap-window = "squeeze-bottom";
#popup windows
animation-for-transient-window = "slide-down"; #available options: slide-up, slide-down, slide-left, slide-right, squeeze, squeeze-bottom, zoom

#set animation for windows being transitioned out while changings tags
animation-for-prev-tag = "minimize";
#enables fading for windows being transitioned out while changings tags
enable-fading-prev-tag = true;

#set animation for windows being transitioned in while changings tags
animation-for-next-tag = "maximize";
#enables fading for windows being transitioned in while changings tags
enable-fading-next-tag = true;

